<header class="header">
  <div class="container">
    <div class="header__content">
      <!-- Logo + título -->
      <div class="header__brand">
        <div class="header__logo">
          <!-- Icono médico -->
          <img src="/assets/images/medical-icon.svg" alt="Icono médico" class="header__logo-icon" />

        </div>
      </div>

      <!-- Botón Hamburguesa -->
      <button class="header__menu-toggle" (click)="toggleMenu()" aria-label="Toggle menu">
        <svg *ngIf="!isMenuOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <line x1="3" y1="6" x2="21" y2="6" stroke-width="2" stroke-linecap="round" />
          <line x1="3" y1="12" x2="21" y2="12" stroke-width="2" stroke-linecap="round" />
          <line x1="3" y1="18" x2="21" y2="18" stroke-width="2" stroke-linecap="round" />
        </svg>
        <svg *ngIf="isMenuOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <line x1="18" y1="6" x2="6" y2="18" stroke-width="2" stroke-linecap="round" />
          <line x1="6" y1="6" x2="18" y2="18" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>

      <!-- Navegación -->
     <nav class="header__nav" [class.active]="isMenuOpen">

  <!-- NAV LINKS (centrados) -->
  <div class="header__nav-links">
        <!-- Ir a MedicalSoft -->
  <a routerLink="/medicalsoft" (click)="closeMenu()">
    <ng-icon name="heroPlusCircleSolid" class="nav-icon"></ng-icon>
    <span>MedicalSoft</span>
  </a>
    <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">
      <ng-icon name="heroHomeSolid" class="nav-icon"></ng-icon>
      <span>Dashboard</span>
    </a>



    <!-- Dropdown Gestión -->
    
    <div class="nav-dropdown" #configMenuDropdown>
      <div class="nav-dropdown__trigger" (click)="toggleConfigMenu()">
        <ng-icon name="heroCog6ToothSolid" class="nav-icon"></ng-icon>
        <span>Configuración</span>
        <ng-icon [name]="isConfigMenuOpen ? 'heroChevronUpSolid' : 'heroChevronDownSolid'" style="width: 16px; height: 16px;"></ng-icon>
      </div>
      <div class="nav-dropdown__menu" [class.active]="isConfigMenuOpen">
        <a routerLink="/config/users" routerLinkActive="active" (click)="closeMenu()">
          <ng-icon name="heroUsersSolid" class="nav-icon"></ng-icon>
          <span>Usuarios</span>
        </a>
        <a routerLink="/config/roles" routerLinkActive="active" (click)="closeMenu()">
          <ng-icon name="heroShieldCheckSolid" class="nav-icon"></ng-icon>
          <span>Roles</span>
        </a>
      </div>
    </div>

    <div class="nav-dropdown" #gestionMenuDropdown>
      <div class="nav-dropdown__trigger" (click)="toggleGestionMenu()">
        <ng-icon name="heroUsersSolid" class="nav-icon"></ng-icon>
        <span>Gestión</span>
        <ng-icon [name]="isGestionMenuOpen ? 'heroChevronUpSolid' : 'heroChevronDownSolid'" style="width: 16px; height: 16px;"></ng-icon>
      </div>

      <div class="nav-dropdown__menu" [class.active]="isGestionMenuOpen">
        <a routerLink="/gestion/customers" routerLinkActive="active" (click)="closeMenu()">
          <ng-icon name="heroUsersSolid" class="nav-icon"></ng-icon>
          <span>Clientes</span>
        </a>
        <a routerLink="/gestion/payments" routerLinkActive="active" (click)="closeMenu()">
          <ng-icon name="heroCurrencyDollarSolid" class="nav-icon"></ng-icon>
          <span>Pagos</span>
        </a>
        <a routerLink="/gestion/accounts" routerLinkActive="active" (click)="closeMenu()">
          <ng-icon name="heroBuildingLibrarySolid" class="nav-icon"></ng-icon>
          <span>Cuentas</span>
        </a>
      </div>
    </div>

  </div>
  

  <!-- ACTIONS (derecha) -->
  <div class="header__nav-actions">
    <div class="header__nav-separator"></div>

    <button class="header__notification-btn" aria-label="Notificaciones">
      <ng-icon name="heroBellSolid" class="nav-icon"></ng-icon>
      <span class="badge"></span>
    </button>

    <app-theme-toggle></app-theme-toggle>

    <div class="nav-dropdown" #userMenuDropdown>
      <div class="header__user" (click)="toggleUserMenu()">
        <div class="header__user-avatar">
          <span>MP</span>
        </div>
      </div>

      <div class="header__user-menu" [class.active]="isUserMenuOpen">
        <div class="user-details">
          <span class="header__user-name">{{ userName }}</span>
          <span class="header__user-role">{{ userRole }}</span>
        </div>
        <div class="divider"></div>
        <div class="logout-btn" (click)="logout()">
           <ng-icon name="heroArrowRightOnRectangleSolid" class="nav-icon"></ng-icon>
           <span>Cerrar Sesión</span>
        </div>
      </div>
    </div>
  </div>

</nav>

    </div>
  </div>
</header>
